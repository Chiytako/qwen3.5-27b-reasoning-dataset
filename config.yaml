# =============================================================================
# Qwen3.5-27B Reasoning Dataset Generation Pipeline Configuration
# =============================================================================

# --- モデル設定 ---
model:
  name: "Qwen/Qwen3.5-27B"                  # 192GBあるためフルパラメータ(FP16/BF16)モデルで推論能力を最大化
  max_model_len: 24576                      # 超大容量VRAMを活かして24Kの巨大コンテキスト長を確保
  gpu_memory_utilization: 0.95              # MI300Xの192GBのうち95％(約182GB)をvLLMで使用
  quantization: null                        # 量子化なし（生成スピードと推論限界性能を両立）
  trust_remote_code: true

# --- 推論パラメータ ---
generation:
  temperature: 0.6                          # Reasoning/Codingタスク向けの推奨値(0.6)
  top_p: 0.95                               # Qwen推論の標準的推奨値へ
  top_k: 20                                 # 推奨値に合わせて40から20へ絞る
  max_tokens: 8192                          # 最大生成トークン数
  min_tokens: 256                           # 最小生成トークン数
  repetition_penalty: 1.0                   # 推論（思考タグ）中の反復を妨げないように1.0（ペナルティなし）を推奨
  num_samples_per_prompt: 3                 # rejection sampling用: 各プロンプトにN個生成
  batch_size: 256                           # メモリ帯域5.3TB/s・HBM3 192GBをフル活用し、スループットを最大化する超巨大バッチ

# --- 並列処理設定 ---
parallel:
  num_workers: 1                            # MI300X 1枚
  tensor_parallel_size: 1                   # GPU 1枚で実行
  samples_per_worker: 1000000               # 1基で100万件を担当
  checkpoint_interval: 256                  # Spotインスタンスの中断対策：1バッチ(256件)ごとに即時保存

# --- データセット設定 ---
dataset:
  target_total_samples: 1000000             # 目標生成件数
  language_ratio:
    ja: 0.7                                 # 日本語 70%
    en: 0.3                                 # 英語 30%
  
  # ドメイン分布（ツールユーズ重視）
  domain_distribution:
    tool_use_api_calling: 0.20              # API/関数呼び出し
    tool_use_multi_step: 0.15               # 複数ツール連携
    tool_use_error_handling: 0.08           # エラー処理・リトライ
    coding_agent: 0.20                      # コーディングエージェント (Opencode/Claude Code風)
    code_generation: 0.10                   # コード生成（ツール作成含む）
    math_reasoning: 0.07                    # 数学推論
    logic_reasoning: 0.06                   # 論理推論
    science: 0.04                           # 科学推論
    planning: 0.05                          # 計画・タスク分解
    general_knowledge: 0.05                 # 一般知識推論

# --- 品質フィルタリング ---
quality_filter:
  min_thinking_steps: 3                     # 最小思考ステップ数
  max_thinking_steps: 50                    # 最大思考ステップ数
  min_response_tokens: 100                  # 最小回答トークン数
  max_response_tokens: 6000                 # 最大回答トークン数
  min_thinking_tokens: 50                   # 最小思考トークン数
  require_tool_calls: true                  # ツール呼び出しを含む必要あり（ツールユーズドメインのみ）
  min_tool_calls: 1                         # 最小ツール呼び出し数
  dedup_similarity_threshold: 0.85          # 重複除去の類似度閾値
  language_consistency_check: true          # 言語一貫性チェック

# --- 出力設定 ---
output:
  base_dir: "./output"
  raw_dir: "./output/raw"                   # 生のLLM出力
  filtered_dir: "./output/filtered"         # フィルタ済み
  final_dir: "./output/final"               # 最終データセット
  format: "jsonl"                           # 出力形式
  split_size: 50000                         # ファイルあたりの件数
  save_rejected: true                       # リジェクトされたデータも保存

# --- ツール定義テンプレート ---
tool_categories:
  - name: "web_search"
    description: "ウェブ検索・情報取得系ツール"
    tools: ["search_web", "fetch_url", "scrape_page", "search_news"]
  
  - name: "file_operations"
    description: "ファイル操作系ツール"
    tools: ["read_file", "write_file", "list_directory", "delete_file", "move_file"]
  
  - name: "code_execution"
    description: "コード実行・開発系ツール"
    tools: ["run_python", "run_bash", "install_package", "debug_code"]
  
  - name: "data_processing"
    description: "データ処理・分析系ツール"
    tools: ["query_database", "transform_data", "visualize_data", "export_csv"]
  
  - name: "communication"
    description: "コミュニケーション系ツール"
    tools: ["send_email", "send_message", "create_calendar_event", "translate_text"]
  
  - name: "math_computation"
    description: "数学・計算系ツール"
    tools: ["calculate", "solve_equation", "plot_graph", "statistical_analysis"]
  
  - name: "image_processing"
    description: "画像処理系ツール"
    tools: ["generate_image", "resize_image", "ocr_extract", "image_search"]
  
  - name: "system_admin"
    description: "システム管理系ツール"
    tools: ["check_status", "deploy_service", "monitor_logs", "manage_config"]
  
  - name: "coding_agent"
    description: "コーディングエージェント系ツール（Opencode/Claude Code風）"
    tools: [
      "read_file", "write_file", "edit_file", "list_directory",
      "grep_search", "find_files", "run_command", "view_code_definition",
      "codebase_search", "browser_action", "ask_user", "task_complete"
    ]

# --- ログ設定 ---
logging:
  level: "INFO"
  file: "./logs/generation.log"
  console: true
